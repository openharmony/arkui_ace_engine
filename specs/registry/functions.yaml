top_levels:
- id: '01'
  slug: 01-architecture
  title: 架构通用设计
  description: 编译构建、目录结构、部件化、兼容性设计、架构优化
- id: '02'
  slug: 02-cross-platform
  title: 跨平台适配层
  description: 多平台适配、平台抽象、渲染后端适配
- id: '03'
  slug: 03-engine-framework
  title: 引擎框架层
  description: 渲染管线、动效、资源主题、事件框架、窗口、多实例、无障碍、DFX
- id: '04'
  slug: 04-common-capability
  title: 通用能力层
  description: 通用属性、通用事件、自定义扩展、自定义节点、路由、焦点、输入交互等通用能力
- id: '05'
  slug: 05-ui-components
  title: 组件层
  description: 布局、导航、滚动容器、表单、选择、弹窗、文本、图片、绘制等组件
- id: '06'
  slug: 06-common-interface
  title: 通用接口层
  description: 前端桥接、Inner 接口、其它范式接入
- id: '07'
  slug: 07-frontend
  title: 前端层
  description: ArkTS 高级组件、状态管理、自定义组件、生成式 UI
- id: 08
  slug: 08-ndk
  title: NDK
  description: Node C-API、XComponent C-API 等 NDK 接口
- id: 09
  slug: 09-developer-tools
  title: 开发者工具
  description: 预览器、工具链、开发者文档、Sample、ComponentTest
- id: '10'
  slug: 10-product-customization
  title: 产品化定制
  description: 穿戴等产品化定制能力
